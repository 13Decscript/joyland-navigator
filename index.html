<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joyland Navigator PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary: linear-gradient(135deg,#1a73e8,#6a5cff);
    --bg: linear-gradient(135deg,#dfe9f3,#ffffff);
}

body {
    font-family: 'Chakra Petch', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    max-width: 420px;
    width: 100%;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    animation: fadeIn .5s;
}

h2 { text-align:center; }

.btn-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.choice-btn {
    padding:14px;
    border-radius:12px;
    border:none;
    background:white;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.choice-btn:hover {
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.next-btn {
    background: var(--primary);
    color:white;
    border:none;
    padding:15px;
    border-radius:14px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

.status-badge {
    background:#e3f2fd;
    padding:8px;
    border-radius:20px;
    text-align:center;
    margin-bottom:10px;
}

#cur-stage-name {
    font-size:1.4em;
    font-weight:bold;
    color:#1a73e8;
    text-shadow:0 0 10px rgba(26,115,232,0.3);
    transition:.3s;
}

.nav-ui { display:none; }

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div id="finder-section">
<h2>ค้นหาตำแหน่ง</h2>
<div id="finder-btns" class="btn-grid"></div>
</div>

<div id="nav-section" class="nav-ui">
<div id="status-bar" class="status-badge"></div>
<div id="cur-move-label"></div>
<div id="cur-stage-name"></div>
<button class="next-btn" onclick="nextMove()">ไปต่อ →</button>
</div>

</div>

<script>

const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

document.addEventListener("click", () => {
    clickSound.currentTime = 0;
    clickSound.play();
});

const patterns = {
1:["การผจญภัยเล็ก","กางเขนชะตากรรม","การผจญภัยเล็ก","การดวลบล็อก","การผจญภัยเล็ก","การผจญภัยเล็ก","กางเขนชะตากรรม","แดนลับแห่งการ์ด","การผจญภัยเล็ก","กางเขนชะตากรรม","การผจญภัยเล็ก","การดวลบล็อก","วงล้อคลั่งไคล้"]
};

const stages=["การผจญภัยเล็ก","กางเขนชะตากรรม","การดวลบล็อก","ขวานบินสะท้อน","แดนลับแห่งการ์ด","วงล้อคลั่งไคล้"];

let currentPos=0;

function init(){
const grid=document.getElementById("finder-btns");
grid.innerHTML="";
stages.forEach(s=>{
let b=document.createElement("button");
b.className="choice-btn";
b.innerText=s;
b.onclick=()=>startNav();
grid.appendChild(b);
});
}

function startNav(){
document.getElementById("finder-section").style.display="none";
document.getElementById("nav-section").style.display="block";
render();
}

function render(){
let stage=document.getElementById("cur-stage-name");
stage.style.opacity=0;
setTimeout(()=>{
stage.innerText=patterns[1][currentPos];
stage.style.opacity=1;
},150);
document.getElementById("cur-move-label").innerText="Move "+(currentPos+1);
}

function nextMove(){
currentPos++;
if(currentPos>=patterns[1].length){currentPos=0;}
render();
}

init();

</script>

</body>
</html>
